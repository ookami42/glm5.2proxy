name: Build desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-desktop:
    name: Windows desktop
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cmd/desktop/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/desktop/frontend
        run: npm ci

      - name: Build frontend assets for Go embed
        working-directory: cmd/desktop/frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Build Wails desktop app
        run: npm run desktop:build

      - name: Create checksum
        shell: pwsh
        run: |
          $artifact = "build/bin/glm5.2proxy.exe"
          $hash = Get-FileHash -Algorithm SHA256 $artifact
          "$($hash.Hash.ToLower())  glm5.2proxy.exe" | Set-Content -Encoding ascii build/bin/glm5.2proxy.exe.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: glm5.2proxy-windows
          path: |
            build/bin/glm5.2proxy.exe
            build/bin/glm5.2proxy.exe.sha256

  linux-desktop:
    name: Linux desktop
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Wails App
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -tags webkit2_41

      - name: Package for Ubuntu (.deb)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="glm5.2proxy_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/local/bin" "${PKG}/usr/share/applications" "${PKG}/usr/share/icons/hicolor/256x256/apps"

          printf '%s\n' \
            'Package: glm5.2proxy' \
            "Version: ${VERSION}" \
            'Architecture: amd64' \
            'Maintainer: maicon2' \
            'Description: GLM 5.2 Proxy - Desktop application' \
            'Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libappindicator3-1, librsvg2-2' \
            > "${PKG}/DEBIAN/control"

          cp build/bin/glm5.2proxy "${PKG}/usr/local/bin/"
          cp build/linux/glm5.2proxy.desktop "${PKG}/usr/share/applications/"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/glm5.2proxy.png"

          dpkg-deb --build "${PKG}"
          mkdir -p dist
          mv "${PKG}.deb" dist/

      - name: Package for Arch Linux (.tar.gz)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_DIR="glm5.2proxy_${VERSION}_linux_amd64"
          mkdir -p "${TAR_DIR}"
          cp build/bin/glm5.2proxy build/linux/glm5.2proxy.desktop build/appicon.png "${TAR_DIR}/"
          tar -czf "dist/glm5.2proxy_${VERSION}_linux_amd64.tar.gz" "${TAR_DIR}"

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows-desktop
      - linux-desktop
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: glm5.2proxy-windows
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: release-assets/linux

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/glm5.2proxy.exe
            release-assets/windows/glm5.2proxy.exe.sha256
            release-assets/linux/*
