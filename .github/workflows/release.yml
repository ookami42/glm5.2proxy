name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Wails)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails app
        run: wails build

      - name: Package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="glm5.2proxy_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          cat > "${PKG}/DEBIAN/control" <<EOF
Package: glm5.2proxy
Version: ${VERSION}
Architecture: amd64
Maintainer: maicon2
Description: GLM 5.2 Proxy - Desktop application
Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libappindicator3-1, librsvg2-2
EOF

          cp build/bin/glm5.2proxy "${PKG}/usr/local/bin/"
          cp build/glm5.2proxy.desktop "${PKG}/usr/share/applications/"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/glm5.2proxy.png"

          dpkg-deb --build "${PKG}"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: glm5.2proxy-deb
          path: ./*.deb
