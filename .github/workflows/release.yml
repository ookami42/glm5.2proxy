name: Build desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-desktop:
    name: Windows desktop
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cmd/desktop/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/desktop/frontend
        run: npm ci

      - name: Run Go tests
        run: go test ./...

      - name: Build Wails desktop app
        run: npm run desktop:build

      - name: Create checksum
        shell: pwsh
        run: |
          $artifact = "build/bin/glm5.2proxy.exe"
          $hash = Get-FileHash -Algorithm SHA256 $artifact
          "$($hash.Hash.ToLower())  glm5.2proxy.exe" | Set-Content -Encoding ascii build/bin/glm5.2proxy.exe.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: glm5.2proxy-windows
          path: |
            build/bin/glm5.2proxy.exe
            build/bin/glm5.2proxy.exe.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/glm5.2proxy.exe
            build/bin/glm5.2proxy.exe.sha256
