name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (Ubuntu & Arch)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails App
        run: wails build -tags webkit2_41

      - name: Package for Ubuntu (.deb)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="glm5.2proxy_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/local/bin" "${PKG}/usr/share/applications" "${PKG}/usr/share/icons/hicolor/256x256/apps"

          printf '%s\n' \
            'Package: glm5.2proxy' \
            "Version: ${VERSION}" \
            'Architecture: amd64' \
            'Maintainer: maicon2' \
            'Description: GLM 5.2 Proxy - Desktop application' \
            'Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libappindicator3-1, librsvg2-2' \
            > "${PKG}/DEBIAN/control"

          cp build/bin/glm5.2proxy "${PKG}/usr/local/bin/"
          cp build/linux/glm5.2proxy.desktop "${PKG}/usr/share/applications/"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/glm5.2proxy.png"

          dpkg-deb --build "${PKG}"
          mkdir -p dist
          mv "${PKG}.deb" dist/

      - name: Package for Arch Linux (.tar.gz)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_DIR="glm5.2proxy_${VERSION}_linux_amd64"
          mkdir -p "${TAR_DIR}"
          cp build/bin/glm5.2proxy build/linux/glm5.2proxy.desktop build/appicon.png "${TAR_DIR}/"
          tar -czf "dist/glm5.2proxy_${VERSION}_linux_amd64.tar.gz" "${TAR_DIR}"

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails App
        run: wails build

      - name: Package for Windows (.exe & .zip)
        shell: pwsh
        run: |
          $VERSION = "${env:GITHUB_REF_NAME}".Replace("v", "")
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build/bin/glm5.2proxy.exe -Destination "dist/glm5.2proxy_${VERSION}_windows_amd64.exe"
          Compress-Archive -Path build/bin/glm5.2proxy.exe -DestinationPath "dist/glm5.2proxy_${VERSION}_windows_amd64.zip"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/*

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
